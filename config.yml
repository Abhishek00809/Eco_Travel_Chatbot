# =============================================================
# ECO-TRAVEL ADVISOR CHATBOT — config.yml
# NLU Pipeline + Dialogue Policies Configuration
# =============================================================

recipe: default.v1

assistant_id: eco_travel_advisor

language: en

# -------------------------------------------------------------
# NLU PIPELINE
# -------------------------------------------------------------
pipeline:

  - name: WhitespaceTokenizer

  - name: RegexFeaturizer

  - name: LexicalSyntacticFeaturizer

  - name: CountVectorsFeaturizer

  - name: CountVectorsFeaturizer
    analyzer: char_wb
    min_ngram: 1
    max_ngram: 4

  - name: DIETClassifier
    epochs: 100
    constrain_similarities: true
    entity_recognition: true

  - name: EntitySynonymMapper

  - name: FallbackClassifier
    threshold: 0.4
    ambiguity_threshold: 0.1

policies:

  - name: TEDPolicy
    max_history: 5
    epochs: 100
    constrain_similarities: true

